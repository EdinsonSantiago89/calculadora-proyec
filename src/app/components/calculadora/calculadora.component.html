<div class="container py-4">
  <div class="row g-4 justify-content-center">
    
    <div class="col-lg-5">
      <div class="card p-4 custom-card">
        <h4 class="fw-bold mb-4 text-center border-bottom pb-2">
          <i class="bi bi-gear-fill me-2"></i>PARÁMETROS DE OBRA
        </h4>

        <div class="mb-3">
          <label class="form-label small fw-bold">UBICACIÓN EN OBRA</label>
          <input type="text" [(ngModel)]="zona" placeholder="Ej: 3D2" class="form-control custom-input text-uppercase">
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold">TIPO DE ELEMENTO</label>
          <select [(ngModel)]="tipoSeccion" class="form-select custom-input">
            <option value="rectangular">Columna Rectangular</option>
            <option value="circular">Columna Circular</option>
          </select>
        </div>

        <div class="row g-3 mb-3">
          <ng-container *ngIf="tipoSeccion === 'rectangular'">
            <div class="col-6">
              <label class="form-label small fw-bold">ANCHO (m)</label>
              <input type="number" [(ngModel)]="largo" class="form-control custom-input">
            </div>
            <div class="col-6">
              <label class="form-label small fw-bold">LARGO (m)</label>
              <input type="number" [(ngModel)]="ancho" class="form-control custom-input">
            </div>
          </ng-container>

          <div class="col-6" *ngIf="tipoSeccion === 'circular'">
            <label class="form-label small fw-bold">DIÁMETRO (m)</label>
            <input type="number" [(ngModel)]="diametro" class="form-control custom-input">
          </div>

          <div class="col-6">
            <label class="form-label small fw-bold">ALTURA (m)</label>
            <input type="number" [(ngModel)]="alto" class="form-control custom-input">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold">RESISTENCIA f'c (kg/cm²)</label>
          <select [(ngModel)]="fcSeleccionado" class="form-select custom-input">
            <option *ngFor="let res of [140, 175, 210, 245, 280]" [value]="res">{{res}}</option>
          </select>
        </div>

        <button (click)="calcular()" class="btn btn-warning w-100 py-3 fw-bold">
          <i class="bi bi-calculator me-2"></i>CALCULAR MATERIALES
        </button>
      </div>
    </div>

    <div class="col-lg-6" *ngIf="volumen > 0">
      <div class="card p-4 custom-card">
        <h5 class="fw-bold mb-4 text-center border-bottom pb-2 text-uppercase">
          Cálculo de Materiales <small class="text-muted">(+5% Desp.)</small>
        </h5>
        
        <div class="row g-3">
          <div class="col-6">
            <div class="result-tile p-3 text-center rounded">
              <i class="bi bi-box-seam h2 text-warning d-block mb-1"></i>
              <span class="d-block h4 fw-bold mb-0">{{cemento | number:'1.1-1'}}</span>
              <small class="text-white-50 fw-bold">BULTOS CEMENTO</small>
            </div>
          </div>

          <div class="col-6">
            <div class="result-tile p-3 text-center rounded">
              <i class="bi bi-moisture h2 text-warning d-block mb-1"></i>
              <span class="d-block h4 fw-bold mb-0">{{arena | number:'1.2-2'}}</span>
              <small class="text-white-50 fw-bold">ARENA m³</small>
            </div>
          </div>

          <div class="col-6">
            <div class="result-tile p-3 text-center rounded">
              <i class="bi bi-grid-3x3-gap-fill h2 text-warning d-block mb-1"></i>
              <span class="d-block h4 fw-bold mb-0">{{piedra | number:'1.2-2'}}</span>
              <small class="text-white-50 fw-bold">PIEDRA m³</small>
            </div>
          </div>

          <div class="col-6">
            <div class="result-tile p-3 text-center rounded">
              <i class="bi bi-droplet-fill h2 text-info d-block mb-1"></i>
              <span class="d-block h4 fw-bold mb-0">{{agua | number:'1.0-0'}}</span>
              <small class="text-white-50 fw-bold">AGUA Lts</small>
            </div>
          </div>
        </div>

        <div class="d-flex gap-5 mt-4">
          <button (click)="guardarProyecto()" class="btn btn-warning w-100 py-2 fw-bold">
            <i class="bi bi-save me-2"></i>GUARDAR
          </button>
        
          <button (click)="limpiar()" class="btn btn-warning w-100 py-2 fw-bold" style="background: #bbb;">
            <i class="bi bi-trash me-2"></i>LIMPIAR
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
