<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
  <div class="card p-4 shadow-lg" style="width: 350px; border-radius: 15px;">
    <div class="text-center mb-4">
      <h2 class="text-primary">ObraControl</h2>
      <p class="text-muted">Inicia sesión para calcular</p>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Correo Electrónico</label>
      <input type="email" name="usuario" [(ngModel)]="usuario" class="form-control" placeholder="ejemplo@correo.com">
    </div>
    
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" name="clave" [(ngModel)]="clave" class="form-control" placeholder="****">
    </div>
    
    <button (click)="ingresar()" class="btn btn-primary w-100 py-2">Ingresar Sistema</button>
  </div>
</div>
